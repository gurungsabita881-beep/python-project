<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="ending.css">
  <meta charset="UTF-8">
  <title>Karaoke Lyrics</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff0f5, #ffe4e1, #fdf5e6);
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    .lyrics {
      font-size: 2.2em;
      font-weight: bold;
      color: #888;
      text-align: center;
      z-index: 2;
      max-width: 80%;
      line-height: 1.5em;
    }
    .highlight {
      color: #ff1493;
      text-shadow: 0 0 25px #ff69b4;
      transform: scale(1.15);
      transition: all 1.5s ease; /* smoother glow */
    }
    .heart {
      position: absolute;
      font-size: 24px;
      color: red;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }
    .grow-text {
      font-size: 2em;
      font-weight: bold;
      color: #ff1493;
      text-shadow: 0 0 20px #ff69b4;
      opacity: 0;
      animation: grow 5s ease-in-out forwards;
    }
    @keyframes grow {
      0%   { transform: scale(1); opacity: 0.5; }
      50%  { transform: scale(3); opacity: 1; }
      100% { transform: scale(6); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="lyrics" id="lyrics">
    <div>I would swim across the sea just to show you</div>
    <div>Sacrifice my life just to hold you</div>
    <div>I could go on and on to prove that</div>
    <div>You belong here in my</div>
    </div>

  <!-- Ending word outside lyrics -->
  <div id="ending">ARMS</div>
  

  <script>

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.top = window.innerHeight + 'px';
      heart.style.fontSize = (30 + Math.random() * 30) + 'px';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 100);
  </script>
  <script src="script.js"></script>
</body>
</html>
